server:
  port: 8080

spring:
  application:
    name: ai-invitecode

  datasource:
    url: jdbc:mysql://localhost:3306/ai_invitecode?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10

  mail:
    host: smtp.example.com
    port: 587
    username: your@email.com
    password: your-password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

# 应用自定义配置
app:
  jwt:
    secret: ai-invitecode-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256
    expiration: 7200
  encrypt:
    key: ai-invitecode-aes256key

logging:
  level:
    com.aicode: debug
    org.springframework.security: warn
